name: Regression Guards

on:
  push:
    branches: [main, master, develop, feature/optuna, feat/inference-api, optimize-critical-bottlenecks]
  pull_request:
    branches: [main, master, develop, feature/optuna, feat/inference-api, optimize-critical-bottlenecks]
  workflow_dispatch:

jobs:
  regression-guards:
    runs-on: ubuntu-latest
    name: Regression Guards (py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: "**/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run architecture/leakage guards
        run: pytest -q tests/test_architecture_and_leakage.py --maxfail=1

      - name: Run preprocessing robustness guards
        run: pytest -q tests/test_preprocessing_pipeline.py --maxfail=1

      - name: Run flow and fine-tuning guards
        run: |
          pytest -q \
            tests/test_flows.py \
            tests/test_finetune.py \
            --maxfail=1

      - name: Run trainer and Optuna guards
        run: |
          pytest -q \
            tests/test_forecast_output.py \
            tests/test_trainer_scheduling.py \
            tests/test_trainer_integration.py \
            tests/test_tune_hyperparams.py \
            --maxfail=1
