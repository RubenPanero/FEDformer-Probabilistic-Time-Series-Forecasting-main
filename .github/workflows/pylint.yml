name: Pylint

on:
  push:
    branches: [ main, master, develop, feature/optuna, feat/inference-api, optimize-critical-bottlenecks ]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint

      - name: Run pylint
        env:
          PYTHONPATH: .
        run: |
          set -euo pipefail
          TARGET_PATHS=()
          for path in main.py config.py models training utils inference; do
            if [ -e "$path" ]; then
              TARGET_PATHS+=("$path")
            fi
          done
          if [ ${#TARGET_PATHS[@]} -eq 0 ]; then
            echo "No lint targets found."
            exit 0
          fi
          FILES=()
          for target in "${TARGET_PATHS[@]}"; do
            if [ -d "$target" ]; then
              while IFS= read -r file; do
                FILES+=("$file")
              done < <(find "$target" -type f -name "*.py" -not -path "*/__pycache__/*")
            elif [ -f "$target" ]; then
              FILES+=("$target")
            fi
          done
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No Python files found under lint targets."
            exit 0
          fi
          set +e
          pylint --disable=all --enable=E,F "${FILES[@]}"
          exit_code=$?
          set -e
          if [ "$exit_code" -eq 32 ]; then
            echo "Pylint usage error (exit 32). Skipping this run."
            exit 0
          fi
          exit "$exit_code"
