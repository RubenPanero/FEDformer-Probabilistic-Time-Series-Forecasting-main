name: CI

on:
  push:
    branches: [main, master, develop, feature/optuna, feat/probabilistic-metrics-pipeline, feat/inference-api, optimize-critical-bottlenecks]
  pull_request:
    branches: [main, master, develop, feature/optuna, optimize-critical-bottlenecks]
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: "**/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: CLI smoke check
        run: python main.py --help

      - name: Run core fast test shard
        run: |
          pytest -q \
            tests/test_dataset.py \
            tests/test_encoder_decoder.py \
            tests/test_fedformer_basic.py \
            tests/test_flows.py \
            tests/test_forecast_output.py \
            tests/test_reproducibility.py \
            tests/test_trainer_scheduling.py \
            tests/test_trainer_integration.py \
            --maxfail=1 --disable-warnings

      - name: Run simulations and utils fast shard
        if: runner.os == 'Linux'
        run: |
          pytest -q \
            tests/test_simulations.py \
            tests/test_utils.py \
            tests/test_probabilistic_metrics.py \
            tests/test_experiment_outputs.py \
            tests/test_experiment_registry.py \
            tests/test_config_presets.py \
            tests/test_ablation_matrix.py \
            tests/test_seed_aggregation.py \
            --maxfail=1 --disable-warnings

      - name: Run feature branch regression slice
        if: runner.os == 'Linux'
        run: |
          pytest -q \
            tests/test_forecast_output.py \
            tests/test_model_registry.py \
            tests/test_trainer_scheduling.py \
            tests/test_trainer_integration.py \
            tests/test_tune_hyperparams.py \
            tests/test_checkpoint_selection.py \
            tests/test_inference.py \
            --maxfail=1

      - name: Coverage report (best-effort)
        if: ${{ always() && runner.os == 'Linux' }}
        run: pytest -q -m "not slow" --cov=. --cov-report=xml:coverage.xml || true
